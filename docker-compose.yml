services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-3000}:3000"          # Backend-Port (optional in .env anpassen)
    volumes:
      - ./data:/data                  # SQLite-Datenbank + seed.json
      - uploads:/uploads              # Hochgeladene PDFs (eigenes Volume)
      - ./data/exports:/exports       # Exportierte PDFs (Host-Verzeichnis)
    environment:
      DATABASE_URL: sqlite:/data/pkv.db
      JWT_SECRET: ${JWT_SECRET:-changeme-bitte-aendern}   # ← ÄNDERN: langen Zufallsstring setzen
      SEED_FILE: /data/seed.json
      UPLOADS_DIR: /uploads
      EXPORTS_DIR: /exports
      MULTIPAGE_SCAN: ${MULTIPAGE_SCAN:-true}             # Mehrseitiger Scan: true | false
      PAPERLESS_NGX_URL: ${PAPERLESS_NGX_URL:-}           # Paperless NGX URL, z.B. http://paperless:8000
      PAPERLESS_NGX_TOKEN: ${PAPERLESS_NGX_TOKEN:-}       # API-Token aus Paperless NGX
    networks:
      - default
      - proxy-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${UI_PORT:-8090}:80"         # Frontend-Port (optional in .env anpassen)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:

networks:
  default: {}
  proxy-net:
    external: true
